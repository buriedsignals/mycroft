<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Mycroft — AI for investigative journalism">
  <title>Mycroft — AI for investigative journalism</title>
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap');
      .wordmark  { font-family: 'IM Fell English', 'Libre Caslon Text', 'Hoefler Text', Georgia, serif; fill: #1a1a1a; }
      .headline  { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 700; fill: #1a1a1a; }
      .tagline   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #56606e; }
      .meta      { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; fill: #56606e; letter-spacing: 0.05em; }
      .divider   { stroke: #d1d5da; stroke-width: 2; }
    ]]></style>
  </defs>

  <!-- newsprint-tone background -->
  <rect width="1200" height="630" fill="#f5efe3"/>

  <!-- Wordmark centred upper -->
  <text class="wordmark" x="600" y="210" text-anchor="middle" font-size="120" letter-spacing="0.005em">Mycroft</text>

  <!-- Divider -->
  <line class="divider" x1="480" y1="260" x2="720" y2="260"/>

  <!-- Headline -->
  <text class="headline" x="600" y="340" text-anchor="middle" font-size="48">AI for investigative journalism</text>

  <!-- Tagline -->
  <text class="tagline" x="600" y="410" text-anchor="middle" font-size="28">Open-weight models. Zero data retention. Local-capable.</text>

  <!-- Meta row -->
  <text class="meta" x="600" y="560" text-anchor="middle" font-size="22" text-transform="uppercase">~$6 / month moderate use · $0 local · open source</text>
</svg>
