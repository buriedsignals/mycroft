version: "1.0.0"
title: "Map domain"
description: "Discover all accessible URLs on a domain. Useful when investigating a site's full coverage of a topic or scoping a scrape."

instructions: |
  Use the sitemap tool (robots.txt/sitemap.xml) to enumerate URLs on a domain. Do not recursively scrape from the map — use separate recipes for that.

parameters:
  - key: domain
    input_type: string
    requirement: required
    description: "Root URL of the domain to map (e.g. https://example.org)"
  - key: search
    input_type: string
    requirement: optional
    description: "Filter URLs by substring"
    default: ""

extensions:
  - type: builtin
    name: developer

prompt: |
  Map URLs on {{ domain }}.

  Run:
  ```sh
  {% if search %}python3 "$MYCROFT_DIR/tools/sitemap.py" {{ domain }} --match "{{ search }}"{% else %}python3 "$MYCROFT_DIR/tools/sitemap.py" {{ domain }}{% endif %}
  ```

  Return the discovered URL list organised by apparent category (if URL structure makes it obvious: `/news/`, `/about/`, `/docs/`, etc.).

  Report:
  - Total URL count
  - Breakdown by path prefix
  - Notable paths worth scraping (e.g. `/press-releases/`, `/board-minutes/`)
  - Paths that look like they host structured civic data

  Do NOT auto-scrape all URLs — surface the map for the journalist to decide.
