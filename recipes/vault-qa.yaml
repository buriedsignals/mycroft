version: "1.0.0"
title: "Vault Q&A"
description: "Answer a journalist's question grounded in their vault and live web search, with citations for every factual claim."

instructions: |
  Load the Mycroft journalism instructions (ethics, attribution, SIFT, no fabrication) as the session's system context.
  Answer from the journalist's vault first; supplement with live web via the `firecrawl` CLI when the vault is incomplete.
  Every factual claim must have a citation. If neither vault nor web has it, say "not found in available sources".

parameters:
  - key: question
    input_type: string
    requirement: required
    description: "The question to answer"
  - key: vault_path
    input_type: string
    requirement: required
    description: "Absolute or ~-expanded path to the journalist's vault root"
    default: "~/Documents/Mycroft"
  - key: entity
    input_type: string
    requirement: optional
    description: "Entity name for activity suggestions (person, org, topic)"
    default: "[entity]"

extensions:
  - type: builtin
    name: developer
    description: "Shell + file access — used to grep/read vault files and invoke the firecrawl CLI"

prompt: |
  Question: {{ question }}
  Vault root: {{ vault_path }}

  Steps:

  1. Search the vault for relevant content:
     - `rg -l "..." {{ vault_path }}` to find candidate notes
     - Read the most relevant ones in full (not summaries — you need direct quotes for citations)

  2. If vault coverage is incomplete, use the firecrawl CLI for live web:
     - `firecrawl search "query"` for discovery (returns JSON; parse and pick relevant URLs)
     - `firecrawl scrape <url>` for specific pages (returns markdown)
     - Never use WebFetch, curl, or any other browser tool — firecrawl only.

  3. Synthesize an answer:
     - Lead with the answer in 1-3 sentences.
     - Follow with supporting detail.
     - Every factual claim gets an inline citation:
       - Vault: relative note path, e.g. `investigations/acme/source-a.md`
       - Web: the full URL
     - Flag unverified claims with an `unverified:` prefix.
     - If neither vault nor web has a fact you'd otherwise need, say "not found in available sources" — do NOT fabricate.

  4. End with a short "gaps" section if appropriate:
     - What would strengthen the answer
     - What to verify next

  Keep the overall answer tight. Terse. No moralising, no sycophancy.

activities:
  - "message: **Vault Q&A ready.** Ask anything grounded in your vault + live web. Every claim gets a citation."
  - "What do I already have on ...?"
  - "What's the latest on my beat this week?"
  - "Cross-check these claims against my sources"
  - "Summarise what I have on {{ entity }} across all investigations"
