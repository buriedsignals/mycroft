version: "1.0.0"
title: "Scrape — fetch a page"
description: "Scrape a single URL to clean markdown via the Crawl4AI-backed scrape tool. Preferred primitive for fetching a known page."

instructions: |
  Use the Crawl4AI-backed scrape tool. Never WebFetch, curl, or any other browser tool.

parameters:
  - key: url
    input_type: string
    requirement: required
    description: "The URL to scrape"
  - key: format
    input_type: select
    requirement: optional
    description: "Output format"
    default: "markdown"
    options: ["markdown", "html", "links"]

extensions:
  - type: builtin
    name: developer

prompt: |
  Scrape {{ url }} and return {{ format }}.

  Run: `python3 "$MYCROFT_DIR/tools/scrape.py" {{ url }} --format {{ format }}`

  Output verbatim — do NOT summarize unless asked. The caller can request summary separately.

  If the scrape tool errors (paywall, 403, timeout), report the error clearly with the command that failed.
