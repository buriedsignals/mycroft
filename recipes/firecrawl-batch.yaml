version: "1.0.0"
title: "Batch scrape"
description: "Scrape N URLs in parallel (own IP; no vendor rate limits). Useful for source comparison, beat sweeps, or bulk extraction."

instructions: |
  Batch scrape via the Crawl4AI-backed scrape tool (own IP; no vendor rate limits).

parameters:
  - key: urls
    input_type: string
    requirement: required
    description: "Newline-separated URLs, or a path to a file with one URL per line"
  - key: format
    input_type: select
    requirement: optional
    description: "Output format"
    default: "markdown"
    options: ["markdown", "html", "links"]

extensions:
  - type: builtin
    name: developer

prompt: |
  Batch scrape these URLs:

  ```
  {{ urls }}
  ```

  If `{{ urls }}` is a path, read the file first. Normalize to one URL per line.

  Run each via `python3 "$MYCROFT_DIR/tools/scrape.py" <url> --format {{ format }}`. Parallelize with `xargs -P 4` (own-IP, no vendor rate limits):

  ```sh
  echo "<URLS>" | xargs -P 4 -I {} sh -c 'python3 "$MYCROFT_DIR/tools/scrape.py" {} --format {{ format }} > /tmp/fc-$(echo {} | md5 | cut -c1-8).md; echo "DONE: {}"'
  ```

  For each URL, report:
  - URL
  - Success / failed (with error)
  - Byte count
  - First 200 chars of content (for quick inspection)

  Return a summary table + saved file paths. Do NOT dump full content into the conversation for every URL — refer the journalist to the files.

  On rate-limit (429), back off 30s and retry once.
