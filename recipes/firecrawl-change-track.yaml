version: "1.0.0"
title: "Change tracking"
description: "Scrape a URL with a per-investigation tag so later runs produce a diff. Useful for manually monitoring a page across sessions."

instructions: |
  Snapshot the page each run and diff against the last snapshot to record changes.

parameters:
  - key: url
    input_type: string
    requirement: required
    description: "The URL to monitor"
  - key: tag
    input_type: string
    requirement: required
    description: "Investigation / project tag — all runs under the same tag are diffed against each other"

extensions:
  - type: builtin
    name: developer

prompt: |
  Track changes on {{ url }} under tag `{{ tag }}`.

  Run:
  ```sh
  SNAP="$HOME/.mycroft/track/{{ tag }}.md"
  mkdir -p "$(dirname "$SNAP")"
  python3 "$MYCROFT_DIR/tools/scrape.py" {{ url }} > "$SNAP.new"
  if [ -f "$SNAP" ]; then diff -u "$SNAP" "$SNAP.new" && echo "(no change since last snapshot)"; else echo "baseline established — no prior snapshot to compare"; fi
  mv "$SNAP.new" "$SNAP"
  ```

  Return the scraped content plus the diff. Highlight:
  - Was anything new?
  - What specifically changed (git-diff output)?
  - (diff -u shows added/removed lines; empty diff means unchanged.)

  If this is the first run for this tag, note "baseline established — no prior snapshot to compare".
