version: "1.0.0"
title: "Fact-check (SIFT + C2PA)"
description: "Run SIFT methodology against a draft article with C2PA provenance tracking. Returns per-claim verdicts with cryptographically verifiable source references."

instructions: |
  Load the Mycroft journalism instructions (ethics, SIFT, no fabrication) as session context.
  Load ~/.mycroft/skills/fact-check/SKILL.md before checking claims.
  Apply SIFT rigorously; each factual claim gets a specific verdict, never a vague hedge.
  Do not rewrite the draft; do not moralise. Report, let the journalist decide.

  IMPORTANT: Use `mycroft-fetch` instead of raw `firecrawl` for all web fetches.
  This captures evidence records (URL, local artifact, SHA-256 hash, timestamp)
  for grounding and optional C2PA package signing.

parameters:
  - key: draft_path
    input_type: string
    requirement: optional
    description: "Path to the draft file (markdown, text, docx)"
    default: ""
  - key: draft_text
    input_type: string
    requirement: optional
    description: "Draft text inline (use when draft is short and pastable)"
    default: ""
  - key: emit_manifest
    input_type: boolean
    requirement: optional
    description: "Emit SIFT manifest JSON for C2PA signing"
    default: true
  - key: c2pa_sign
    input_type: boolean
    requirement: optional
    description: "Automatically sign via C2PA artifact service"
    default: false

extensions:
  - type: builtin
    name: developer
    description: "Shell + file access — reads the draft, invokes mycroft-fetch CLI for verification with provenance capture"

prompt: |
  SIFT fact-check with Mycroft grounding and optional C2PA provenance tracking.

  Apply the SIFT framework:
    - **S**top — don't accept claims at face value
    - **I**nvestigate the source — who, what track record, what interest
    - **F**ind better coverage — more authoritative or independent confirmation
    - **T**race claims to original context — did the source accurately represent the original?

  Draft source:
  {% if draft_path %}Read the file at `{{ draft_path }}`.{% endif %}
  {% if draft_text %}
  ```
  {{ draft_text }}
  ```
  {% endif %}

  Process:

  1. Extract every factual claim: numbers, dates, quotes, named individuals, events, attributions, causal assertions.

  2. Check local prior context before broad web search:
     - Search the Mycroft vault with QMD for known entities, prior source notes, and earlier verdicts.
     - If Spotlight is installed, search the Spotlight vault for related active case evidence.
     - Treat prior context as evidence to inspect, not as automatic truth.

  3. For each claim, assign a verdict from this closed set:
     - **verified** — confirmed by 2+ authoritative independent sources (cite all)
     - **partially verified** — one source confirms, others silent; or partial aspects confirmed
     - **unverified** — not found in available sources; flag as needs reporting
     - **contradicted** — a more authoritative source disagrees (cite the contradiction explicitly)
     - **mischaracterized** — source exists but the claim misrepresents it (cite original + explain the gap)

  4. IMPORTANT — Use `mycroft-fetch` (not raw firecrawl) for all web access:
     - `mycroft-fetch scrape <url>` for specific pages
     - `mycroft-fetch search "query"` for discovery
     - This captures local source artifacts, SHA-256 hashes, timestamps, and evidence IDs.
     - After each fetch, note the evidence ID from the JSON output (e.g., `E-a1b2c3d4e5f6`).
     - Never use WebFetch, curl, firecrawl directly, or any other browser tool.

  5. Output as a markdown table:

     | # | Claim | Verdict | Primary source | Evidence ID | Grounding | Notes |
     |---|-------|---------|----------------|-------------|-----------|-------|
     | 1 | ... | verified | https://... | E-xxx | direct/full | ... |

  6. End with a summary block:
     - Verdict counts (verified / partially / unverified / contradicted / mischaracterized)
     - Claims needing additional reporting (list with specific next steps)
     - Strongest-supported claim(s)
     - Weakest/most-at-risk claim(s)

  {% if emit_manifest %}
  7. After the summary, emit an evidence bundle JSON block and a SIFT manifest JSON block:

     Evidence bundle:

     ```json
     {
       "schema_version": "1.0",
       "project": "<draft slug or project>",
       "run_id": "<optional run id>",
       "created_at": "<ISO timestamp>",
       "items": [
         {
           "id": "E-xxx",
           "source_url": "<source URL>",
           "acquisition_method": "firecrawl",
           "accessed_at": "<from mycroft-fetch>",
           "raw_path": "<from mycroft-fetch>",
           "sha256": "<64 lowercase hex from mycroft-fetch>",
           "content_type": "text/markdown",
           "access_method": "full_text",
           "archive_url": "<Wayback/Archive.today URL if created>",
           "human_verification_required": false,
           "claim_links": [
             {
               "claim_id": "claim-001",
               "claim_text": "<claim text>",
               "support_type": "direct"
             }
           ],
           "missing_source_gate": {
             "requested_source": "<what you needed>",
             "returned_artifact": "<raw_path>",
             "missing": "",
             "fallback_required": false,
             "confidence_effect": "none"
           }
         }
       ]
     }
     ```

     Save it to `data/evidence-bundle.json` inside the fact-check package directory.

     SIFT manifest:

     ```json
     {
       "schema": "sift-manifest-v1",
       "timestamp": "<ISO timestamp>",
       "investigator": {
         "name": "<your name from MYCROFT_USER_NAME or 'Mycroft'>",
         "organization": "<from MYCROFT_ORG or empty>"
       },
       "draft": {
         "path": "{{ draft_path }}",
         "content_hash": "sha256:<hash of draft content>",
         "title": "<extracted or inferred title>"
       },
       "claims": [
         {
           "id": "claim-001",
           "text": "<claim text>",
           "verdict": "<verdict>",
           "confidence": "high|medium|low",
           "evidence_refs": ["E-xxx", "E-yyy"],
           "sources": ["E-xxx", "E-yyy"],
           "grounding": {
             "support_type": "direct|indirect|inferred|contradicted|insufficient",
             "source_role": "primary|secondary|contextual",
             "claim_elements_checked": ["actor", "action", "date"],
             "missing_assumptions": [],
             "confidence_cap": "high|medium|low",
             "misgrounding_risk": "<short risk statement>",
             "assessment": "<why evidence does or does not ground the claim; include contradiction-search outcome>"
           },
           "notes": "<optional notes>"
         }
       ],
       "sources": [
         {
           "id": "E-xxx",
           "evidence_id": "E-xxx",
           "url": "<source URL>",
           "content_hash": "sha256:<64 lowercase hex from mycroft-fetch>",
           "access_timestamp": "<from mycroft-fetch>",
           "access_type": "full",
           "sift_step": "trace_to_original",
           "is_primary": true,
           "title": "<human-readable title>"
         }
       ],
       "summary": {
         "verified": <count>,
         "partially_verified": <count>,
         "unverified": <count>,
         "contradicted": <count>,
         "mischaracterized": <count>,
         "total_claims": <count>,
         "total_sources": <count>
       },
       "methodology": {
         "name": "SIFT",
         "version": "1.0",
         "vault_searched": true,
         "web_searched": true
       }
     }
     ```

     Save this manifest to `data/sift-manifest.json` inside the fact-check package directory.
     Then run:

     ```bash
     python3 "$MYCROFT_DIR/tools/validate-grounding.py" <package-dir> --strict-files
     python3 "$MYCROFT_DIR/tools/build-provenance-manifest.py" <package-dir>
     ```
  {% endif %}

  {% if c2pa_sign %}
  8. After saving and validating the package, call the C2PA artifact service to sign:

     ```bash
     python3 "$MYCROFT_DIR/tools/build-provenance-manifest.py" <package-dir> \
       --sign-endpoint "${NOOSPHERE_C2PA_URL:-http://localhost:5002/api/mycroft/provenance/sign}" \
       --credential-id "${NOOSPHERE_C2PA_CREDENTIAL_ID:-}" \
       --artifact review.md
     ```

     Report the signing status and receipt path. Do not say C2PA proves the claims are true; say the verification package is tamper-evident if signing succeeds.
  {% endif %}

  Rules:
  - Do not rewrite the draft.
  - Do not moralise.
  - If you cannot verify a claim and cannot find a contradiction, verdict is `unverified` — that is not a failure, it is the correct verdict.
  - Never fabricate sources.
  - Always use mycroft-fetch for provenance tracking.

activities:
  - "message: **SIFT fact-check ready (C2PA-enabled).** Paste a draft or point to a file. I'll return per-claim verdicts with cryptographic provenance."
  - "Fact-check my latest draft with C2PA signing"
  - "Verify claims and generate SIFT manifest"
  - "Re-run fact-check and update provenance"
