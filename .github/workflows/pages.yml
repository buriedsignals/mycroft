name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate recipes
        run: python3 tools/validate-recipes.py
      - name: Validate HTML parses
        run: |
          python3 -c "
          import html.parser
          class V(html.parser.HTMLParser):
              def error(self, m): raise Exception(m)
          for f in ['index.html', 'setup.html']:
              V().feed(open(f).read())
              print(f + ': OK')
          "
      - name: Validate setup generator
        run: node tests/setup-generator-check.js
      - name: Validate grounding/provenance tooling
        run: python3 tests/grounding-provenance-check.py
      - name: Validate JSON parses
        run: |
          python3 -c "
          import json, glob
          for f in glob.glob('providers/*.json') + glob.glob('extensions/*.json') + glob.glob('schemas/*.json'):
              json.load(open(f))
              print(f + ': OK')
          "

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
